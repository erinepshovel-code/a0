version: v1.2
baseline:
  scope: conversation
  rolling_rounds: 20
  clamp_negative_deltas: true
channels:
  PV:
    lexicon_file: lexicon_pv_v1.txt
    match_mode: exact_token_or_phrase
  PR:
    lexicon_file: lexicon_pr_v1.txt
    match_mode: cluster_event
  EP:
    lexicon_file: lexicon_ep_v1.txt
    directed_only: true
  HD:
    inventory:
      core_verbs:
      - kill
      - shoot
      - murder
      - stab
      conditional_phrase:
        verb: beat
        required_token: up
        max_gap: 1
